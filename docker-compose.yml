services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cv_analyzer
      POSTGRES_USER: cv_user
      POSTGRES_PASSWORD: cv_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cv_user -d cv_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: cv_user
      RABBITMQ_DEFAULT_PASS: cv_password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: change-this-secret-in-production
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      POSTGRES_DB: cv_analyzer
      POSTGRES_USER: cv_user
      POSTGRES_PASSWORD: cv_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      RABBITMQ_URL: amqp://cv_user:cv_password@rabbitmq:5672/%2F
      CV_QUEUE_NAME: cv_processing
      LOG_LEVEL: INFO
    volumes:
      - media_data:/app/backend/media
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DJANGO_SECRET_KEY: change-this-secret-in-production
      DJANGO_DEBUG: "true"
      POSTGRES_DB: cv_analyzer
      POSTGRES_USER: cv_user
      POSTGRES_PASSWORD: cv_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      RABBITMQ_URL: amqp://cv_user:cv_password@rabbitmq:5672/%2F
      CV_QUEUE_NAME: cv_processing
      ENABLE_TRANSFORMER_MODELS: "true"
      SENTENCE_TRANSFORMER_MODEL: sentence-transformers/all-MiniLM-L6-v2
      WORKER_MAX_RETRIES: "3"
      WORKER_PREFETCH: "1"
      LOG_LEVEL: INFO
    volumes:
      - media_data:/app/backend/media
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  media_data:
